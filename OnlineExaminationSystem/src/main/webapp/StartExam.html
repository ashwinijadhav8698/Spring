<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Start Exam</title>

<link rel="stylesheet" href="CSS/form.css">

<script>
	let time = 60;

	function startTimer() {

		setInterval(function() {

			document.getElementById("timer").innerHTML = "Time Left : " + time
					+ " sec";

			time--;

			if (time < 0) {

				alert("Exam Submitted Automatically");

				document.getElementById("examForm").submit();
			}

		}, 1000);

	}
</script>

</head>

<body onload="startTimer()">

	<div class="form-container">

		<h1>Online Exam</h1>

		<h2 id="timer"></h2>

		<form id="examForm">

			<p>1. Java is?</p>

			<input type="radio" name="q1"> Language <br> <input
				type="radio" name="q1"> Animal <br> <input type="radio"
				name="q1"> Car <br> <input type="radio" name="q1">
			Fruit <br>
			<br>

			<button type="submit">Submit Exam</button>

		</form>

	</div>

</body>
</html>
