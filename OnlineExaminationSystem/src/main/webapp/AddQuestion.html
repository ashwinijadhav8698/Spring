<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Question</title>

<link rel="stylesheet" href="CSS/form.css">

</head>
<body>

	<div class="form-container">

		<h1>Add Question</h1>

		<form action="addQuestionServlet" method="post">

			<input type="number" name="examid" placeholder="Enter Exam ID"
				required> <input type="text" name="question"
				placeholder="Enter Question" required> <input type="text"
				name="option1" placeholder="Option 1" required> <input
				type="text" name="option2" placeholder="Option 2" required>

			<input type="text" name="option3" placeholder="Option 3" required>

			<input type="text" name="option4" placeholder="Option 4" required>

			<input type="text" name="answer" placeholder="Correct Answer"
				required>

			<button type="submit">Add Question</button>

		</form>

	</div>

</body>
</html>
