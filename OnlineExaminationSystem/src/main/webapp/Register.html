<!DOCTYPE html>
<html>
<head>
<title>Student Register</title>

<link rel="stylesheet" href="CSS/style.css">

</head>

<body>

	<div class="form-container">

		<form class="form-box" action="studentRegisterServlet" method="post">

			<h2>Student Registration</h2>

			<input type="text" name="name" placeholder="Enter Full Name" required>

			<input type="email" name="email" placeholder="Enter Email" required>

			<input type="password" name="password" placeholder="Create Password"
				required> <input type="text" name="course"
				placeholder="Enter Course" required> <input type="text"
				name="mobile" placeholder="Enter Mobile" required>

			<button type="submit">Register</button>

			<p>
				Already Registered? <a href="StudentLogin.html"> Login Here </a>

			</p>

		</form>

	</div>

</body>
</html>
